<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#15110d" media="(prefers-color-scheme: dark)" />
<meta name="theme-color" content="#efe6d2" media="(prefers-color-scheme: light)" />
<title>STADSTUR — Field Edition</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,600;12..96,700;12..96,800&family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
<style>
  :root {
    --paper: #efe6d2;
    --paper-2: #e6dcc1;
    --ink: #15110d;
    --ink-soft: #5b5042;
    --accent: #e8442a;
    --accent-ink: #ffffff;
    --visited: #1c3a8a;
    --warn: #d4a73a;
    --danger: #b91c1c;
    --display: 'Bricolage Grotesque', system-ui, sans-serif;
    --serif: 'Instrument Serif', Georgia, serif;
    --mono: 'JetBrains Mono', ui-monospace, monospace;
    --shadow-hard: 5px 5px 0 var(--ink);
    --shadow-hard-lg: 8px 8px 0 var(--ink);
  }
  [data-palette="forest"] {
    --paper: #ece5d0;
    --accent: #1f5d2e;
    --visited: #c64a1e;
  }
  [data-palette="cobalt"] {
    --paper: #ece4d1;
    --accent: #1d3a8a;
    --visited: #d94a8a;
  }
  [data-palette="midnight"] {
    --paper: #1a1612;
    --paper-2: #261f17;
    --ink: #f4ecd6;
    --ink-soft: #c2b294;
    --accent: #ff7848;
    --visited: #6fb3ff;
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; height: 100%; }
  body {
    background: var(--paper);
    color: var(--ink);
    font-family: var(--display);
    font-size: 16px;
    line-height: 1.45;
    -webkit-tap-highlight-color: transparent;
    display: flex; flex-direction: column;
    min-height: 100vh; min-height: 100dvh;
    background-image:
      radial-gradient(rgba(0,0,0,0.04) 1px, transparent 1.4px),
      radial-gradient(rgba(0,0,0,0.025) 1px, transparent 1.4px);
    background-size: 4px 4px, 11px 11px;
    background-position: 0 0, 2px 3px;
  }
  [data-palette="midnight"] body,
  body[data-palette="midnight"] { background-image: radial-gradient(rgba(255,255,255,0.03) 1px, transparent 1.4px); background-size: 4px 4px; }

  button { font: inherit; color: inherit; cursor: pointer; background: none; border: none; }
  a { color: var(--accent); text-underline-offset: 3px; text-decoration-thickness: 2px; }
  h1, h2, h3 { margin: 0; font-weight: 800; letter-spacing: -0.02em; line-height: 1.02; }
  small { font-family: var(--mono); font-size: 0.75rem; letter-spacing: 0.08em; color: var(--ink-soft); }
  .dim { color: var(--ink-soft); }

  /* ---- TOPBAR ---- */
  .topbar {
    background: var(--ink);
    color: var(--paper);
    display: flex; align-items: center; justify-content: space-between;
    padding: 10px 16px;
    position: sticky; top: 0; z-index: 1000;
    border-bottom: 3px solid var(--ink);
  }
  .wordmark { display: flex; align-items: baseline; gap: 10px; }
  .wordmark .mark {
    font-family: var(--display);
    font-weight: 800;
    font-size: 1.05rem;
    letter-spacing: 0.04em;
    text-transform: uppercase;
  }
  .wordmark .sub {
    font-family: var(--mono);
    font-size: 0.62rem;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--paper);
    opacity: 0.55;
  }
  .topbar .actions { display: flex; gap: 6px; }
  .icon-btn {
    width: 36px; height: 36px;
    border: 2px solid var(--paper);
    background: transparent;
    color: var(--paper);
    display: inline-flex; align-items: center; justify-content: center;
    font-family: var(--display);
    font-weight: 800;
    font-size: 1rem;
    border-radius: 0;
    transition: background 0.12s;
  }
  .icon-btn:hover { background: var(--paper); color: var(--ink); }

  .view { flex: 1; padding: 18px 16px 32px; max-width: 760px; width: 100%; margin: 0 auto; }
  .hidden { display: none !important; }

  /* ---- BUTTONS ---- */
  .btn {
    display: inline-flex; align-items: center; justify-content: center;
    gap: 10px;
    background: var(--ink);
    color: var(--paper);
    border: 2px solid var(--ink);
    border-radius: 0;
    padding: 15px 20px;
    font-family: var(--display);
    font-weight: 800;
    font-size: 0.92rem;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    min-height: 50px;
    box-shadow: var(--shadow-hard);
    transition: transform 0.08s, box-shadow 0.08s;
    text-align: left;
    cursor: pointer;
  }
  .btn:active { transform: translate(4px, 4px); box-shadow: 1px 1px 0 var(--ink); }
  .btn.accent { background: var(--accent); color: white; }
  .btn.secondary { background: var(--paper); color: var(--ink); }
  .btn.ghost { background: transparent; color: var(--ink); box-shadow: none; }
  .btn.ghost:active { transform: none; box-shadow: none; opacity: 0.6; }
  .btn.danger { background: var(--danger); color: white; }
  .btn:disabled { opacity: 0.45; cursor: not-allowed; box-shadow: var(--shadow-hard); }
  .btn .arrow { font-family: var(--display); font-weight: 800; }
  .btn-row { display: flex; flex-wrap: wrap; gap: 12px; margin: 14px 0; }
  .btn-row .btn { flex: 1; min-width: 150px; }

  /* ---- DROP ZONE ---- */
  .drop {
    position: relative;
    border: 3px dashed var(--ink);
    background: var(--paper);
    padding: 38px 22px 30px;
    text-align: center;
    cursor: pointer;
    margin: 4px 0 18px;
    transition: background 0.12s;
  }
  .drop.over { background: var(--paper-2); border-style: solid; border-color: var(--accent); }
  .drop::before {
    content: "ARRIVAL CARD No. 001";
    position: absolute; top: -10px; left: 18px;
    background: var(--paper); padding: 0 10px;
    font-family: var(--mono); font-size: 0.66rem;
    letter-spacing: 0.22em; color: var(--ink);
  }
  .drop .pin {
    display: inline-block;
    width: 56px; height: 56px; border: 3px solid var(--ink);
    background: var(--accent); color: white;
    display: inline-flex; align-items: center; justify-content: center;
    font-family: var(--display); font-weight: 800; font-size: 1.4rem;
    border-radius: 50%;
    margin-bottom: 14px;
    box-shadow: 4px 4px 0 var(--ink);
  }
  .drop strong {
    font-family: var(--display); font-size: 1.5rem; font-weight: 800; display: block; letter-spacing: -0.02em;
  }
  .drop .sub { font-family: var(--mono); font-size: 0.72rem; letter-spacing: 0.16em; text-transform: uppercase; color: var(--ink-soft); margin-top: 6px; }
  .drop input[type=file] { display: none; }

  /* ---- HERO BLOCK ---- */
  .hero {
    padding: 8px 0 18px;
    border-bottom: 4px double var(--ink);
    margin-bottom: 18px;
  }
  .hero .kicker {
    font-family: var(--mono);
    font-size: 0.72rem;
    letter-spacing: 0.24em;
    text-transform: uppercase;
    color: var(--ink-soft);
    display: flex; align-items: center; gap: 10px;
  }
  .hero .kicker::after {
    content: ""; flex: 1; height: 2px; background: var(--ink); display: block;
  }
  .hero h1 {
    font-family: var(--display);
    font-size: clamp(2.4rem, 10vw, 4.6rem);
    font-weight: 800;
    line-height: 0.9;
    letter-spacing: -0.05em;
    margin: 14px 0 10px;
    text-wrap: balance;
  }
  .hero h1 .it {
    font-family: var(--serif);
    font-style: italic;
    font-weight: 400;
    letter-spacing: -0.02em;
  }
  .hero .meta-strip {
    display: flex; flex-wrap: wrap; gap: 0;
    font-family: var(--mono);
    font-size: 0.75rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--ink);
    border-top: 2px solid var(--ink);
    border-bottom: 2px solid var(--ink);
    padding: 8px 0;
    margin-top: 14px;
  }
  .hero .meta-strip > span {
    padding: 0 14px;
    border-right: 1px solid var(--ink-soft);
  }
  .hero .meta-strip > span:first-child { padding-left: 0; }
  .hero .meta-strip > span:last-child { border-right: none; }

  /* ---- THE WORDMARK on start page ---- */
  .splash {
    text-align: left;
    padding: 18px 0 22px;
    margin-bottom: 18px;
    position: relative;
  }
  .splash .num {
    font-family: var(--mono);
    font-size: 0.72rem;
    letter-spacing: 0.24em;
    color: var(--ink-soft);
    text-transform: uppercase;
    display: flex; gap: 12px; align-items: center;
  }
  .splash .num::after { content: ""; flex: 1; height: 2px; background: var(--ink); }
  .splash h1 {
    font-family: var(--display);
    font-size: clamp(3.4rem, 16vw, 7rem);
    font-weight: 800;
    letter-spacing: -0.06em;
    line-height: 0.85;
    margin: 8px 0 0;
  }
  .splash h1 .stack { display: block; }
  .splash h1 .it { font-family: var(--serif); font-style: italic; font-weight: 400; letter-spacing: -0.03em; }
  .splash .tag {
    font-family: var(--serif); font-style: italic;
    font-size: clamp(1.05rem, 3.5vw, 1.4rem);
    color: var(--ink-soft);
    margin-top: 14px;
    max-width: 26em;
  }
  .splash .stamp {
    position: absolute; right: -6px; top: 28px;
    transform: rotate(-12deg);
    border: 2.5px solid var(--accent);
    color: var(--accent);
    padding: 6px 12px 4px;
    font-family: var(--mono); font-weight: 700;
    font-size: 0.7rem; letter-spacing: 0.18em;
    text-transform: uppercase;
    background: var(--paper);
    box-shadow: 2px 2px 0 var(--accent);
  }

  /* ---- CARDS ---- */
  .card {
    background: var(--paper);
    border: 2.5px solid var(--ink);
    border-radius: 0;
    padding: 18px 20px;
    box-shadow: var(--shadow-hard);
    margin: 14px 0;
    position: relative;
  }
  .card.flat { box-shadow: none; }
  .card.accent { background: var(--accent); color: white; border-color: var(--ink); }
  .card.accent .dim { color: rgba(255,255,255,0.75); }

  /* ---- TOUR LIST (saved tours) ---- */
  .section-head {
    display: flex; align-items: baseline; justify-content: space-between;
    margin: 28px 0 8px;
    padding-bottom: 6px;
    border-bottom: 2px solid var(--ink);
  }
  .section-head h2 {
    font-family: var(--display);
    font-size: 1.4rem; font-weight: 800;
    letter-spacing: -0.02em;
    text-transform: uppercase;
  }
  .section-head .count {
    font-family: var(--mono); font-size: 0.75rem; letter-spacing: 0.18em; color: var(--ink-soft);
  }
  .tour-list { display: grid; gap: 14px; }
  .tour-card {
    position: relative;
    background: var(--paper);
    border: 2.5px solid var(--ink);
    padding: 16px 18px 18px;
    box-shadow: var(--shadow-hard);
    cursor: pointer;
    display: grid;
    grid-template-columns: 1fr auto;
    align-items: center;
    gap: 12px;
    transition: transform 0.08s, box-shadow 0.08s;
  }
  .tour-card:active { transform: translate(3px, 3px); box-shadow: 1px 1px 0 var(--ink); }
  .tour-card .city-tag {
    font-family: var(--mono); font-size: 0.7rem; letter-spacing: 0.2em;
    text-transform: uppercase; color: var(--ink-soft); margin-bottom: 4px;
    display: flex; align-items: center; gap: 8px;
  }
  .tour-card .city-tag::before {
    content: ""; display: inline-block; width: 8px; height: 8px; background: var(--accent); border-radius: 50%;
  }
  .tour-card .title {
    font-family: var(--display); font-weight: 800; font-size: 1.2rem; letter-spacing: -0.02em;
    margin-bottom: 4px; line-height: 1.1;
  }
  .tour-card .when {
    font-family: var(--mono); font-size: 0.7rem; letter-spacing: 0.1em; color: var(--ink-soft);
  }
  .tour-card .del {
    width: 38px; height: 38px;
    border: 2px solid var(--ink); background: var(--paper);
    color: var(--ink); font-weight: 800;
    transition: background 0.12s;
  }
  .tour-card .del:hover { background: var(--danger); color: white; border-color: var(--danger); }

  /* ---- MAP FRAME ---- */
  .map-frame {
    position: relative;
    border: 3px solid var(--ink);
    margin: 16px 0;
    box-shadow: var(--shadow-hard-lg);
    background: var(--paper);
  }
  .map-frame::before, .map-frame::after,
  .map-frame > .corner {
    content: "";
    position: absolute;
    width: 14px; height: 14px;
    background: var(--accent);
    z-index: 401;
  }
  .map-frame::before { top: -3px; left: -3px; }
  .map-frame::after { top: -3px; right: -3px; }
  .map-frame .c-bl { bottom: -3px; left: -3px; }
  .map-frame .c-br { bottom: -3px; right: -3px; }
  #map, #active-map {
    width: 100%; position: relative; overflow: hidden; isolation: isolate; z-index: 0;
    filter: contrast(1.02) saturate(0.95);
  }
  #map { height: 360px; }
  #active-map { height: 240px; }

  .leaflet-pane, .leaflet-top, .leaflet-bottom { z-index: auto !important; }
  .leaflet-pane.leaflet-tile-pane { z-index: 1 !important; }
  .leaflet-pane.leaflet-overlay-pane { z-index: 2 !important; }
  .leaflet-pane.leaflet-shadow-pane { z-index: 3 !important; }
  .leaflet-pane.leaflet-marker-pane { z-index: 4 !important; }
  .leaflet-pane.leaflet-tooltip-pane { z-index: 5 !important; }
  .leaflet-pane.leaflet-popup-pane { z-index: 6 !important; }
  .leaflet-top, .leaflet-bottom { z-index: 7 !important; }
  .leaflet-control-zoom a {
    background: var(--paper) !important; color: var(--ink) !important;
    border: 2px solid var(--ink) !important;
    font-family: var(--display) !important; font-weight: 800 !important;
    box-shadow: 2px 2px 0 var(--ink);
  }
  .leaflet-control-attribution {
    background: var(--paper) !important; color: var(--ink-soft) !important;
    font-family: var(--mono) !important; font-size: 0.6rem !important;
    border: 1px solid var(--ink) !important;
  }

  /* ---- WAYPOINT LIST ---- */
  .wp-section { border-top: 3px solid var(--ink); margin-top: 8px; }
  .wp-row {
    display: grid;
    grid-template-columns: 78px 1fr auto;
    align-items: center;
    gap: 14px;
    padding: 16px 4px;
    border-bottom: 2px solid var(--ink);
    cursor: pointer;
    position: relative;
    background: var(--paper);
    transition: padding-left 0.18s;
  }
  .wp-row:hover { padding-left: 14px; background: var(--paper-2); }
  .wp-num {
    font-family: var(--display);
    font-size: 3.4rem;
    font-weight: 800;
    line-height: 1;
    letter-spacing: -0.06em;
    color: var(--ink);
  }
  .wp-row.visited .wp-num { color: var(--accent); position: relative; }
  .wp-row.visited .wp-num::after {
    content: "✗"; position: absolute; top: -6px; right: -10px;
    font-size: 1.2rem; color: var(--accent);
  }
  .wp-row.active-stop { background: var(--ink); color: var(--paper); padding-left: 14px; }
  .wp-row.active-stop .wp-num { color: var(--accent); }
  .wp-row.active-stop .wp-body small { color: rgba(255,255,255,0.7); }
  .wp-row.optional .wp-num { color: var(--warn); }
  .wp-body strong {
    font-family: var(--display); font-size: 1.05rem; font-weight: 700; display: block;
    line-height: 1.18; margin-bottom: 4px;
  }
  .wp-body small { font-family: var(--serif); font-style: italic; font-size: 0.95rem; letter-spacing: 0; text-transform: none; color: var(--ink-soft); line-height: 1.35; display: block; }
  .wp-tag {
    font-family: var(--mono); font-size: 0.62rem;
    letter-spacing: 0.16em; text-transform: uppercase;
    padding: 3px 6px; border: 1.5px solid var(--ink); background: var(--paper);
    display: inline-block;
  }
  .wp-tag.opt { color: var(--warn); border-color: var(--warn); }

  /* ---- PUNCH CARD PROGRESS ---- */
  .punch-card {
    border: 2.5px solid var(--ink);
    padding: 14px 16px;
    margin: 14px 0;
    background: var(--paper);
    box-shadow: var(--shadow-hard);
    position: relative;
  }
  .punch-card .pc-head {
    display: flex; justify-content: space-between; align-items: baseline;
    margin-bottom: 10px;
  }
  .punch-card .pc-head .lbl {
    font-family: var(--mono); font-size: 0.66rem; letter-spacing: 0.22em; text-transform: uppercase;
  }
  .punch-card .pc-head .val {
    font-family: var(--display); font-weight: 800; font-size: 1.2rem; letter-spacing: -0.02em;
  }
  .punch-row {
    display: grid; gap: 6px;
    grid-auto-flow: column; grid-auto-columns: 1fr;
  }
  .punch-cell {
    height: 22px; border: 2px solid var(--ink); background: var(--paper);
    display: flex; align-items: center; justify-content: center;
    font-family: var(--mono); font-size: 0.62rem; font-weight: 700;
    color: var(--ink-soft);
  }
  .punch-cell.done { background: var(--accent); color: white; }
  .punch-cell.active { background: var(--ink); color: var(--accent); }
  .punch-cell.skipped { background: var(--paper-2); color: var(--danger); text-decoration: line-through; }

  /* ---- LIVE DISTANCE HERO ---- */
  .distance-hero {
    text-align: center;
    padding: 30px 16px;
    border: 3px solid var(--ink);
    background: var(--accent);
    color: white;
    box-shadow: var(--shadow-hard-lg);
    position: relative;
    margin: 12px 0;
    overflow: hidden;
  }
  .distance-hero .label {
    font-family: var(--mono);
    font-size: 0.72rem;
    letter-spacing: 0.28em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.85);
  }
  .distance-hero .number {
    font-family: var(--display);
    font-size: clamp(4.5rem, 22vw, 9rem);
    font-weight: 800;
    line-height: 0.85;
    letter-spacing: -0.06em;
    margin: 4px 0;
    font-variant-numeric: tabular-nums;
  }
  .distance-hero .unit {
    font-family: var(--serif);
    font-style: italic;
    font-size: 1.3rem;
    color: rgba(255,255,255,0.92);
  }
  .distance-hero .acc {
    font-family: var(--mono); font-size: 0.7rem; letter-spacing: 0.18em;
    text-transform: uppercase; color: rgba(255,255,255,0.7);
    margin-top: 8px;
  }
  .distance-hero::before,
  .distance-hero::after {
    content: ""; position: absolute; top: 8px; bottom: 8px;
    width: 12px;
    background-image: repeating-linear-gradient(
      to bottom, white 0, white 6px, transparent 6px, transparent 12px
    );
    opacity: 0.5;
  }
  .distance-hero::before { left: 10px; }
  .distance-hero::after { right: 10px; }

  /* ---- STOP COUNTER BAR ---- */
  .stop-bar {
    display: flex; justify-content: space-between; align-items: center;
    padding: 12px 16px;
    background: var(--ink); color: var(--paper);
    margin-bottom: 8px;
    border: 2px solid var(--ink);
  }
  .stop-bar .now {
    font-family: var(--display); font-weight: 800;
    font-size: 1.05rem;
    letter-spacing: -0.01em;
  }
  .stop-bar .of {
    font-family: var(--mono); font-size: 0.72rem; letter-spacing: 0.2em; text-transform: uppercase;
    color: rgba(244,236,214,0.7);
  }

  /* ---- MODAL ---- */
  .modal-backdrop {
    position: fixed; inset: 0;
    background: rgba(21,17,13,0.7);
    z-index: 2000;
    display: flex; align-items: flex-end; justify-content: center;
    backdrop-filter: blur(2px);
  }
  .modal {
    background: var(--paper);
    width: 100%; max-width: 760px; max-height: 92vh;
    overflow-y: auto;
    border: 3px solid var(--ink);
    border-bottom: none;
    border-radius: 0;
    padding: 22px 22px 28px;
    box-shadow: 0 -8px 0 var(--ink);
    position: relative;
  }
  @media (min-width: 600px) {
    .modal-backdrop { align-items: center; padding: 20px; }
    .modal { border: 3px solid var(--ink); border-bottom: 3px solid var(--ink); box-shadow: var(--shadow-hard-lg); max-height: 86vh; }
  }
  .modal::before {
    content: ""; position: absolute; left: 0; right: 0; top: -3px; height: 12px;
    background-image: repeating-linear-gradient(
      to right, var(--ink) 0, var(--ink) 12px, var(--paper) 12px, var(--paper) 24px
    );
  }
  .modal-header { display: flex; justify-content: space-between; align-items: flex-start; gap: 16px; margin-bottom: 14px; padding-top: 6px; }
  .modal-kicker {
    font-family: var(--mono); font-size: 0.72rem; letter-spacing: 0.24em;
    text-transform: uppercase; color: var(--accent); font-weight: 700;
    margin-bottom: 6px;
  }
  .modal-title {
    font-family: var(--display); font-size: clamp(1.7rem, 5vw, 2.4rem);

  .narrative {

  .narrative::first-letter {

  .trivia {

  .trivia::before {
    content: "VISSTE DU?";

  }
  .trivia ul { margin: 8px 0 0; padding-left: 22px; }
  .trivia li { font-family: var(--serif); font-style: italic; font-size: 1.05rem; line-height: 1.45; margin: 4px 0; }
  .trivia li::marker { content: "✦  "; }

  .wp-images {
    display: flex; gap: 10px;
    overflow-x: auto;
    margin: 4px 0 14px;
    padding-bottom: 6px;
  }
  .wp-images img {

  }
  .wp-images .img-search {
    display: inline-flex; align-items: center; padding: 0 18px;
    background: var(--paper-2); border: 3px solid var(--ink);
    box-shadow: 4px 4px 0 var(--ink);
    text-decoration: none; color: var(--ink); height: 180px;
    font-family: var(--display); font-weight: 700; letter-spacing: 0.04em; text-transform: uppercase;

  }

  .links { display: flex; flex-wrap: wrap; gap: 8px; margin: 14px 0; }
  .links a {
    display: inline-block;
    background: var(--paper);
    border: 2px solid var(--ink);

    text-decoration: none;

  .links a:hover { background: var(--accent); color: white; }
  .links a:active { transform: translate(2px, 2px); box-shadow: 1px 1px 0 var(--ink); }

  .banner {
    padding: 12px 16px;
    margin: 12px 0;
    border: 2px solid var(--ink);

  /* ---- INPUTS ---- */
  input[type=text], input[type=password], input[type=number], select, textarea {
    width: 100%;
    background: var(--paper);

  .leaflet-div-icon { background: transparent; border: none; }

    width: 36px; height: 36px; border-radius: 50%;

  .wp-pin.visited { background: var(--accent); }

  .wp-pin.optional { background: var(--warn); color: var(--ink); }
  @keyframes thrum {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.18); }

  .user-dot {
    width: 22px; height: 22px; border-radius: 50%;

  /* ---- HELP / DETAILS ---- */

    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
    background: var(--ink); color: var(--paper);
    border: 2px solid var(--accent);

  }

  /* ---- SUMMARY ---- */
  .summary-stamp {
    text-align: center;
    margin: 18px 0 24px;
  }
  .summary-stamp .big {
    display: inline-block;
    font-family: var(--display); font-size: clamp(3.8rem, 16vw, 6.5rem);
    font-weight: 800; letter-spacing: -0.05em; line-height: 0.9;
    color: var(--accent);
    border: 5px solid var(--accent);
    padding: 16px 32px 8px;
    transform: rotate(-3deg);
    background: var(--paper);
    box-shadow: 6px 6px 0 var(--ink);
  }
  .stat-grid {
    display: grid; grid-template-columns: repeat(3, 1fr);
    border: 2.5px solid var(--ink);
    box-shadow: var(--shadow-hard);
    margin: 18px 0;
  }
  .stat-grid > div {
    padding: 18px 14px;
    text-align: center;
    border-right: 2px solid var(--ink);
    background: var(--paper);
  }
  .stat-grid > div:last-child { border-right: none; }
  .stat-grid .num {
    font-family: var(--display); font-weight: 800;

  .tweaks {

  .tweaks.hidden { display: none; }
  .tweaks-head {

  }
  .tweaks-body { padding: 14px 16px 16px; }
  .tweaks-row { margin-bottom: 12px; }
  .tweaks-row .lbl {
    font-family: var(--mono); font-size: 0.66rem; letter-spacing: 0.2em;
    text-transform: uppercase; margin-bottom: 6px; color: var(--ink-soft);
  }
  .palette-grid { display: flex; gap: 8px; }
  .palette-swatch {
    flex: 1;
    height: 44px;
    border: 2.5px solid var(--ink);
    cursor: pointer;

    transition: transform 0.08s;
  }
  .palette-swatch:hover { transform: translateY(-2px); }
  .palette-swatch.active { box-shadow: 3px 3px 0 var(--ink); }
  .palette-swatch.active::after {
    content: "●"; position: absolute; right: 4px; top: 0; color: var(--ink);
    font-size: 0.7rem;
  }
  .palette-swatch span { flex: 1; }
  .toggle-row { display: flex; gap: 6px; }
  .toggle-btn {
    flex: 1;
    border: 2px solid var(--ink);
    background: var(--paper);
    padding: 8px 6px;
    font-family: var(--mono); font-size: 0.7rem;
    letter-spacing: 0.1em; text-transform: uppercase; font-weight: 700;
  }
  .toggle-btn.active { background: var(--ink); color: var(--paper); }

  /* hide stamps */
  body.no-stamps .stamp,
  body.no-stamps .summary-stamp .big { transform: none !important; }
  body.no-stamps .stamp { display: none; }

  /* ---- Walk-to-next callout ---- */
  .next-stop {
    background: var(--ink);
    color: var(--paper);
    padding: 18px 20px;
    margin: 14px 0;
    border: 2.5px solid var(--ink);

    position: relative;
  }
  .next-stop .lbl {
    font-family: var(--mono); font-size: 0.66rem;

    color: var(--accent); font-weight: 700;
  }
  .next-stop .title {
    font-family: var(--display); font-weight: 800;
    font-size: 1.4rem; letter-spacing: -0.02em;
    margin: 6px 0 8px; line-height: 1.05;
  }
  .next-stop .walk-meta {
    font-family: var(--mono); font-size: 0.78rem; letter-spacing: 0.12em;
    text-transform: uppercase; color: rgba(244,236,214,0.7);
    margin-bottom: 14px;
  }
  .next-stop .btn {
    background: var(--accent); color: white; border-color: var(--accent);
    box-shadow: 3px 3px 0 var(--paper); width: 100%;
  }

  /* ---- TTS button ---- */
  .tts-btn {
    background: var(--paper); color: var(--ink); border: 2.5px solid var(--ink);
    box-shadow: var(--shadow-hard); padding: 14px 18px;
    font-family: var(--display); font-weight: 800; font-size: 0.92rem;
    letter-spacing: 0.04em; text-transform: uppercase;
    display: flex; align-items: center; gap: 12px;
    width: 100%; justify-content: flex-start;
    cursor: pointer;
  }
  .tts-btn .icon {
    width: 32px; height: 32px;
    background: var(--accent); color: white;
    display: inline-flex; align-items: center; justify-content: center;
    font-size: 1rem;
    border-radius: 50%;
  }
  .tts-btn:active { transform: translate(3px, 3px); box-shadow: 1px 1px 0 var(--ink); }

  /* Active stop body adjustments for contrast */
  .wp-row.active-stop .wp-tag { background: var(--accent); color: white; border-color: var(--accent); }

  /* Reduce motion */
  @media (prefers-reduced-motion: reduce) {
    .wp-pin.active { animation: none; }
    * { transition: none !important; }
  }

  /* Mobile tweaks */
  @media (max-width: 480px) {
    .splash .stamp { right: -2px; top: 10px; font-size: 0.62rem; padding: 4px 8px 3px; }
    .wp-row { grid-template-columns: 62px 1fr auto; gap: 10px; }
    .wp-num { font-size: 2.6rem; }
    .modal { padding: 18px 16px 22px; }
    .tweaks { right: 8px; bottom: 8px; width: calc(100vw - 16px); max-width: 320px; }
  }
</style>
</head>
<body>

<header class="topbar">
  <div class="wordmark">
    <div class="mark" id="topbar-title">STADSTUR</div>
    <div class="sub">FIELD EDITION</div>
  </div>
  <div class="actions">
    <button class="icon-btn" id="btn-tweaks" title="Tweaks" aria-label="Tweaks">◐</button>
    <button class="icon-btn" id="btn-home" title="Hem" aria-label="Hem">⌂</button>
    <button class="icon-btn" id="btn-settings" title="Inställningar" aria-label="Inställningar">⚙</button>
  </div>
</header>

<main id="app" class="view"></main>

<!-- Tweaks panel -->
<aside id="tweaks" class="tweaks hidden" aria-hidden="true">
  <div class="tweaks-head">
    <span>Tweaks</span>
    <button class="x" id="tweaks-close" aria-label="Stäng">✕</button>
  </div>
  <div class="tweaks-body">
    <div class="tweaks-row">
      <div class="lbl">Palette</div>
      <div class="palette-grid" id="palette-grid">
        <button class="palette-swatch" data-pal="default" title="Vermilion" style="background: linear-gradient(90deg, #efe6d2 0 40%, #e8442a 40% 70%, #1c3a8a 70%)"></button>
        <button class="palette-swatch" data-pal="forest" title="Forest" style="background: linear-gradient(90deg, #ece5d0 0 40%, #1f5d2e 40% 70%, #c64a1e 70%)"></button>
        <button class="palette-swatch" data-pal="cobalt" title="Cobalt + Pink" style="background: linear-gradient(90deg, #ece4d1 0 40%, #1d3a8a 40% 70%, #d94a8a 70%)"></button>
        <button class="palette-swatch" data-pal="midnight" title="Midnight" style="background: linear-gradient(90deg, #1a1612 0 40%, #ff7848 40% 70%, #6fb3ff 70%)"></button>
      </div>
    </div>
    <div class="tweaks-row">
      <div class="lbl">Stamps & rotation</div>
      <div class="toggle-row">
        <button class="toggle-btn" data-stamp="on">On</button>
        <button class="toggle-btn" data-stamp="off">Off</button>
      </div>
    </div>
    <div class="tweaks-row">
      <div class="lbl">Display weight</div>
      <div class="toggle-row">
        <button class="toggle-btn" data-weight="700">Bold</button>
        <button class="toggle-btn" data-weight="800">Heavy</button>
      </div>
    </div>
  </div>
</aside>

<div id="snackbar-container"></div>

<script>
/* ============ State ============ */
const App = {
  view: 'start',
  tour: null,
  tourId: null,
  progress: null,
  active: false,
  activeWaypointIdx: 0,
  position: null,
  positionAccuracy: null,
  watchId: null,
  wakeLock: null,
  startedAt: null,
  ttsAudio: null,
  ttsPlaying: false,
};

const Settings = {
  load() { try { return JSON.parse(localStorage.getItem('settings')) || {}; } catch { return {}; } },
  save(s) { localStorage.setItem('settings', JSON.stringify(s)); },
  get(key, def) { const s = this.load(); return s[key] !== undefined ? s[key] : def; },
  set(key, value) { const s = this.load(); s[key] = value; this.save(s); },
};

/* ============ Utils ============ */
function $(sel, parent = document) { return parent.querySelector(sel); }
function $$(sel, parent = document) { return [...parent.querySelectorAll(sel)]; }
function el(tag, attrs = {}, ...children) {
  const e = document.createElement(tag);
  for (const [k, v] of Object.entries(attrs)) {
    if (k === 'class') e.className = v;
    else if (k === 'html') e.innerHTML = v;
    else if (k.startsWith('on')) e.addEventListener(k.slice(2).toLowerCase(), v);
    else if (v !== null && v !== undefined && v !== false) e.setAttribute(k, v);
  }
  for (const c of children.flat()) {
    if (c == null || c === false) continue;
    e.appendChild(typeof c === 'string' ? document.createTextNode(c) : c);
  }
  return e;
}
function clamp(x, lo, hi) { return Math.min(hi, Math.max(lo, x)); }
function haversine(a, b) {
  const R = 6371000;
  const toRad = d => d * Math.PI / 180;
  const dLat = toRad(b[0] - a[0]);
  const dLng = toRad(b[1] - a[1]);
  const lat1 = toRad(a[0]); const lat2 = toRad(b[0]);
  const x = Math.sin(dLat/2) ** 2 + Math.cos(lat1) * Math.cos(lat2) * Math.sin(dLng/2) ** 2;
  return 2 * R * Math.asin(Math.sqrt(x));
}
function fmtDistParts(m) {
  if (m == null) return { num: '—', unit: '' };
  if (m < 1000) return { num: Math.round(m).toString(), unit: 'meter' };
  const km = m/1000;
  return { num: km.toFixed(km < 10 ? 1 : 0), unit: 'kilometer' };
}
function fmtDist(m) {
  const p = fmtDistParts(m);
  return p.num === '—' ? '—' : `${p.num} ${p.unit === 'meter' ? 'm' : 'km'}`;
}
function snackbar(msg, ms = 3000) {
  const s = el('div', { class: 'snackbar' }, msg);
  document.body.appendChild(s);
  setTimeout(() => s.remove(), ms);
}

/* ============ Storage ============ */
function loadIndex() { try { return JSON.parse(localStorage.getItem('tours::index')) || []; } catch { return []; } }
function saveIndex(idx) { localStorage.setItem('tours::index', JSON.stringify(idx)); }
function saveTour(tour) {
  const id = tour.tour.id;
  localStorage.setItem(`tour::${id}::data`, JSON.stringify(tour));
  const idx = loadIndex().filter(t => t.id !== id);
  idx.unshift({ id, title: tour.tour.title, city: tour.tour.city, imported_at: new Date().toISOString() });
  saveIndex(idx);
}
function loadTour(id) { try { return JSON.parse(localStorage.getItem(`tour::${id}::data`)); } catch { return null; } }
function loadProgress(id) {
  try { return JSON.parse(localStorage.getItem(`tour::${id}::progress`)) || { visited: [], skipped: [] }; }
  catch { return { visited: [], skipped: [] }; }
}
function saveProgress(id, p) { localStorage.setItem(`tour::${id}::progress`, JSON.stringify(p)); }
function deleteTour(id) {
  localStorage.removeItem(`tour::${id}::data`);
  localStorage.removeItem(`tour::${id}::progress`);
  saveIndex(loadIndex().filter(t => t.id !== id));
}

/* ============ Validation ============ */
function validateTour(data) {
  const errors = [];
  if (!data || typeof data !== 'object') return ['Filen är inte ett giltigt JSON-objekt.'];
  if (!data.schema_version) errors.push('schema_version saknas.');
  if (!data.tour || typeof data.tour !== 'object') errors.push('tour saknas.');
  else {
    for (const f of ['id', 'title', 'city', 'language', 'duration_minutes', 'distance_km', 'difficulty', 'start_coordinates']) {
      if (data.tour[f] === undefined) errors.push(`tour.${f} saknas.`);
    }
    const sc = data.tour.start_coordinates;
    if (sc && (!Array.isArray(sc) || sc.length !== 2 || Math.abs(sc[0]) > 90 || Math.abs(sc[1]) > 180)) errors.push('tour.start_coordinates är ogiltig.');
  }
  if (!Array.isArray(data.waypoints) || data.waypoints.length < 3) errors.push('Minst 3 waypoints krävs.');
  else {
    data.waypoints.forEach((w, i) => {
      for (const f of ['id', 'order', 'title', 'coordinates', 'short', 'narrative']) {
        if (w[f] === undefined) errors.push(`waypoints[${i}].${f} saknas.`);
      }
      if (w.coordinates && (!Array.isArray(w.coordinates) || w.coordinates.length !== 2 || Math.abs(w.coordinates[0]) > 90 || Math.abs(w.coordinates[1]) > 180)) errors.push(`waypoints[${i}].coordinates ogiltig.`);
      if (w.order !== i + 1) errors.push(`waypoints[${i}].order ska vara ${i+1}, är ${w.order}.`);
    });
  }
  return errors;
}

/* ============ Render ============ */
const root = $('#app');
function render() {
  if (App.view === 'start') return renderStart();
  if (App.view === 'overview') return renderOverview();
  if (App.view === 'active') return renderActive();
  if (App.view === 'summary') return renderSummary();
  if (App.view === 'settings') return renderSettings();
}
function setTitle(t) { $('#topbar-title').textContent = t || 'STADSTUR'; }

/* --- Start view --- */
function renderStart() {
  setTitle('STADSTUR');
  root.innerHTML = '';

  const splash = el('section', { class: 'splash' },
    el('div', { class: 'num' }, 'No. 001', el('span', {}, '·'), el('span', {}, '2026 / FIELD EDITION')),
    el('h1', {},
      el('span', { class: 'stack' }, 'Stads'),
      el('span', { class: 'stack' }, 'tur', el('span', { class: 'it' }, ' — guide'))
    ),
    el('div', { class: 'tag' }, 'Sätt på dig skorna. Släpp in en JSON-tur från din AI-assistent. Vi gör resten — narrativ, karta, kompass.'),
    el('div', { class: 'stamp' }, '★ Walk-ready')
  );
  root.appendChild(splash);

  const drop = el('label', { class: 'drop' },
    el('div', {},
      el('span', { class: 'pin' }, '↓')
    ),
    el('strong', {}, 'Släpp en tour.json här'),
    el('div', { class: 'sub' }, 'eller klicka för att välja fil'),
    el('input', { type: 'file', accept: '.json,application/json', onchange: e => handleFile(e.target.files[0]) })
  );
  drop.addEventListener('dragover', e => { e.preventDefault(); drop.classList.add('over'); });
  drop.addEventListener('dragleave', () => drop.classList.remove('over'));
  drop.addEventListener('drop', e => {
    e.preventDefault(); drop.classList.remove('over');
    const f = e.dataTransfer.files[0]; if (f) handleFile(f);
  });
  root.appendChild(drop);

  root.appendChild(el('div', { class: 'btn-row' },
    el('button', { class: 'btn secondary', onclick: () => openPasteModal() }, '◫ Klistra in JSON')
  ));

  const idx = loadIndex();
  if (idx.length) {
    root.appendChild(el('div', { class: 'section-head' },
      el('h2', {}, 'Sparade turer'),
      el('div', { class: 'count' }, `${idx.length} ${idx.length === 1 ? 'tur' : 'turer'}`)
    ));
    const list = el('div', { class: 'tour-list' });
    for (const t of idx) {
      const card = el('div', { class: 'tour-card', onclick: () => openTour(t.id) },
        el('div', {},
          el('div', { class: 'city-tag' }, t.city),
          el('div', { class: 'title' }, t.title),
          el('div', { class: 'when' }, `IMPORTERAD ${new Date(t.imported_at).toLocaleDateString('sv-SE')}`)
        ),
        el('button', { class: 'del', title: 'Ta bort', onclick: e => { e.stopPropagation(); if (confirm('Ta bort denna tur?')) { deleteTour(t.id); render(); } } }, '✕')
      );
      list.appendChild(card);
    }
    root.appendChild(list);
  }

  const help = el('details', { class: 'help' },
    el('summary', {}, 'Hur skapar jag en tur?'),
    el('p', {}, 'Be din AI-assistent (Claude, ChatGPT m.fl.) skapa en tur. Installera skill-paketet city-tour-creator för bästa resultat, eller klistra in dess SKILL.md i samtalet. Be t.ex.: "Skapa en 90-minuters litterär stadstur i Lissabon, på svenska." Spara svaret som en .json-fil och släpp den här.'),
    el('div', { class: 'btn-row', style: 'margin-top: 14px;' },
      el('a', { class: 'btn secondary', href: 'city-tour-creator.zip', download: 'city-tour-creator.zip', style: 'text-decoration:none;' }, '↓ Ladda ner skill-paket (.zip)')
    )
  );
  root.appendChild(help);
}

async function openPasteModal() {
  const ta = el('textarea', {
    placeholder: 'Klistra in hela tour-JSON här...',
    style: 'min-height: 240px;'
  });
  if (navigator.clipboard?.readText) {
    try {
      const text = await navigator.clipboard.readText();
      if (text && text.trim().startsWith('{')) ta.value = text;
    } catch { /* silent */ }
  }
  const importBtn = el('button', { class: 'btn accent', onclick: () => handleJSONText(ta.value) }, 'Importera');
  const pasteBtn = el('button', { class: 'btn secondary', onclick: async () => {
    try { ta.value = await navigator.clipboard.readText(); }
    catch { snackbar('Kunde inte läsa urklipp — klistra in manuellt'); }
  }}, '◫ Hämta från urklipp');
  openModal(el('div', {},
    el('div', { class: 'modal-header' },
      el('div', {},
        el('div', { class: 'modal-kicker' }, '▼ Importera'),
        el('div', { class: 'modal-title' }, 'Klistra in JSON')
      ),
      el('button', { class: 'close', onclick: () => closeModal() }, '✕')
    ),
    el('div', { class: 'dim', style: 'margin-bottom: 10px; font-family: var(--serif); font-style: italic; font-size: 1rem;' },
      'Kopiera hela JSON-blocket från din AI-konversation och klistra in nedan.'),
    ta,
    el('div', { class: 'btn-row', style: 'margin-top: 14px;' }, pasteBtn, importBtn)
  ));
  setTimeout(() => ta.focus(), 50);
}

function handleJSONText(text) {
  text = (text || '').trim();
  if (!text) return showErrors(['Tomt fält — klistra in JSON först.']);
  text = text.replace(/^```(?:json)?\s*/i, '').replace(/```\s*$/, '').trim();
  let data;
  try { data = JSON.parse(text); }
  catch (e) { return showErrors(['JSON gick inte att tolka: ' + e.message]); }
  const errs = validateTour(data);
  if (errs.length) return showErrors(errs);
  closeModal();
  saveTour(data);
  openTour(data.tour.id);
}

async function handleFile(file) {
  if (!file) return;
  try {
    const text = await file.text();
    const data = JSON.parse(text);
    const errs = validateTour(data);
    if (errs.length) return showErrors(errs);
    saveTour(data);
    openTour(data.tour.id);
  } catch (e) {
    showErrors(['Kunde inte läsa filen: ' + e.message]);
  }
}

function showErrors(errs) {
  const msg = errs.join('\n');
  openModal(el('div', {},
    el('div', { class: 'modal-header' },
      el('div', {},
        el('div', { class: 'modal-kicker' }, '✕ Fel'),
        el('div', { class: 'modal-title' }, 'Ogiltig tur-fil')
      ),
      el('button', { class: 'close', onclick: () => closeModal() }, '✕')
    ),
    el('pre', { style: 'white-space:pre-wrap; background:var(--paper-2); padding:14px; border: 2px solid var(--ink); font-family: var(--mono); font-size:0.78rem;' }, msg),
    el('div', { class: 'btn-row' },
      el('button', { class: 'btn secondary', onclick: () => { navigator.clipboard.writeText(msg); snackbar('Kopierat'); } }, '◫ Kopiera fel'),
      el('button', { class: 'btn accent', onclick: () => closeModal() }, 'OK')
    )
  ));
}

function splitWithItalic(title) {
  // Render the title; if it contains an em-dash, italicize the part after it.
  const dashIdx = title.search(/[—–]/);
  if (dashIdx === -1) return [title];
  return [
    title.slice(0, dashIdx).trim(),
    document.createTextNode(' '),
    el('span', { class: 'it' }, title.slice(dashIdx).trim())
  ];
}

function renderPunchCard() {
  const wps = App.tour.waypoints;
  const visited = App.progress.visited;
  const skipped = App.progress.skipped || [];
  const card = el('div', { class: 'punch-card' },
    el('div', { class: 'pc-head' },
      el('div', { class: 'lbl' }, '✓ Framsteg'),
      el('div', { class: 'val' }, `${visited.length} / ${wps.length}`)
    ),
    el('div', { class: 'punch-row', style: `grid-template-columns: repeat(${wps.length}, 1fr);` },
      ...wps.map((w, i) => {
        const isVisited = visited.includes(w.id);
        const isSkipped = skipped.includes(w.id);
        const isActive = App.active && i === App.activeWaypointIdx;
        let cls = 'punch-cell';
        if (isVisited) cls += ' done';
        else if (isSkipped) cls += ' skipped';
        else if (isActive) cls += ' active';
        return el('div', { class: cls }, String(i+1).padStart(2,'0'));
      })
    )
  );
  return card;
}

function initOverviewMap() {
  if (overviewMap) { overviewMap.remove(); overviewMap = null; }
  const t = App.tour.tour;
  overviewMap = L.map('map', { zoomControl: true }).setView(t.start_coordinates, 15);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '&copy; OpenStreetMap', maxZoom: 19
  }).addTo(overviewMap);

  const coords = App.tour.waypoints.map(w => w.coordinates);
  const accent = getComputedStyle(document.body).getPropertyValue('--accent').trim() || '#e8442a';
  const ink = getComputedStyle(document.body).getPropertyValue('--ink').trim() || '#15110d';
  L.polyline(coords, { color: ink, weight: 5, opacity: 0.85, dashArray: '8 6' }).addTo(overviewMap);

  App.tour.waypoints.forEach((w, i) => {
    const visited = App.progress.visited.includes(w.id);
    const cls = `wp-pin${visited ? ' visited' : ''}${w.optional ? ' optional' : ''}`;
    const icon = L.divIcon({ className: '', html: `<div class="${cls}">${w.order}</div>`, iconSize: [36,36], iconAnchor: [18,18] });
    const m = L.marker(w.coordinates, { icon }).addTo(overviewMap);
    m.bindPopup(`<strong style="font-family: var(--display); font-weight: 800;">${w.title}</strong><br>${w.short}`);
    m.on('click', () => showWaypointModal(i, false));
  });

  if (t.map_bounds) overviewMap.fitBounds(t.map_bounds);
  else overviewMap.fitBounds(coords, { padding: [40, 40] });
}

/* --- Active tour --- */
let activeMap = null;
let userMarker = null;
let userAccCircle = null;
let activeMarkers = [];

function startTour(fromStart, mode) {
  App.active = true;
  App.startedAt = App.startedAt || new Date().toISOString();
  if (fromStart) App.activeWaypointIdx = 0;
  else {
    const nextIdx = App.tour.waypoints.findIndex(w => !App.progress.visited.includes(w.id));
    App.activeWaypointIdx = nextIdx >= 0 ? nextIdx : 0;
  }
  App.view = 'active';
  startGeolocation();
  acquireWakeLock();
  render();
}

function renderActive() {
  const wps = App.tour.waypoints;
  const wp = wps[App.activeWaypointIdx];
  setTitle(`STOPP ${App.activeWaypointIdx + 1} / ${wps.length}`);
  root.innerHTML = '';

  // Stop bar
  root.appendChild(el('div', { class: 'stop-bar' },
    el('div', { class: 'now' }, wp.title),
    el('div', { class: 'of' }, `${String(App.activeWaypointIdx+1).padStart(2,'0')} / ${String(wps.length).padStart(2,'0')}`)
  ));

  // Punch card
  root.appendChild(renderPunchCard());

  // Distance hero
  let parts = { num: '—', unit: '' };
  let accText = '';
  if (App.position && wp.coordinates) {
    const d = haversine(App.position, wp.coordinates);
    parts = fmtDistParts(d);
    if (App.positionAccuracy) accText = `GPS ±${Math.round(App.positionAccuracy)} m`;
  }
  root.appendChild(el('div', { class: 'distance-hero' },
    el('div', { class: 'label' }, '◯ Avstånd till nästa stopp'),
    el('div', { class: 'number', id: 'live-distance' }, parts.num),
    el('div', { class: 'unit' }, parts.unit),
    el('div', { class: 'acc', id: 'live-accuracy' }, accText)
  ));

  // Map
  const mapFrame = el('div', { class: 'map-frame' },
    el('div', { class: 'corner c-bl' }),
    el('div', { class: 'corner c-br' }),
    el('div', { id: 'active-map' })
  );
  root.appendChild(mapFrame);

  // Action buttons
  root.appendChild(el('div', { class: 'btn-row' },
    el('button', { class: 'btn accent', onclick: () => openInMaps(wp.coordinates) }, '↗ Navigera dit'),
    el('button', { class: 'btn secondary', onclick: () => triggerArrival() }, '◉ Jag är framme'),
  ));
  root.appendChild(el('div', { class: 'btn-row' },
    el('button', { class: 'btn ghost', onclick: () => skipWaypoint() }, 'Hoppa över'),
    el('button', { class: 'btn ghost', onclick: () => endTour() }, 'Avsluta tur'),
  ));

  // Current stop card preview
  root.appendChild(el('div', { class: 'card' },
    el('div', { class: 'modal-kicker' }, `Stopp ${String(App.activeWaypointIdx+1).padStart(2,'0')}`),
    el('div', { class: 'modal-title', style: 'font-size: 1.5rem;' }, wp.title),
    el('div', { class: 'modal-sub' }, wp.short),
    el('div', { class: 'btn-row', style: 'margin-top: 16px;' },
      el('button', { class: 'btn', onclick: () => showWaypointModal(App.activeWaypointIdx, true) }, '▤ Visa kort')
    )
  ));

  setTimeout(() => initActiveMap(), 50);
}

function initActiveMap() {
  if (activeMap) { activeMap.remove(); activeMap = null; }
  activeMarkers = [];
  const wp = App.tour.waypoints[App.activeWaypointIdx];
  activeMap = L.map('active-map').setView(wp.coordinates, 16);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { attribution: '&copy; OpenStreetMap', maxZoom: 19 }).addTo(activeMap);
  const coords = App.tour.waypoints.map(w => w.coordinates);
  const ink = getComputedStyle(document.body).getPropertyValue('--ink').trim() || '#15110d';
  L.polyline(coords, { color: ink, weight: 4, opacity: 0.6, dashArray: '6 5' }).addTo(activeMap);
  App.tour.waypoints.forEach((w, i) => {
    const visited = App.progress.visited.includes(w.id);
    const isActive = i === App.activeWaypointIdx;
    const cls = `wp-pin${visited ? ' visited' : ''}${isActive ? ' active' : ''}${w.optional ? ' optional' : ''}`;
    const icon = L.divIcon({ className: '', html: `<div class="${cls}">${w.order}</div>`, iconSize: [36,36], iconAnchor: [18,18] });
    const m = L.marker(w.coordinates, { icon }).addTo(activeMap);
    activeMarkers.push(m);
  });
  updateUserMarker();
}

function updateLiveDistance() {
  const wp = App.tour.waypoints[App.activeWaypointIdx];
  if (!wp || !App.position) return;
  const dEl = document.getElementById('live-distance');
  const aEl = document.getElementById('live-accuracy');
  if (dEl) {
    const parts = fmtDistParts(haversine(App.position, wp.coordinates));
    dEl.textContent = parts.num;
    const unitEl = dEl.parentElement?.querySelector('.unit');
    if (unitEl) unitEl.textContent = parts.unit;
  }
  if (aEl && App.positionAccuracy) aEl.textContent = `GPS ±${Math.round(App.positionAccuracy)} m`;
}

function updateUserMarker() {
  if (!activeMap || !App.position) return;
  if (!userMarker) {
    const icon = L.divIcon({ className: '', html: `<div class="user-dot"></div>`, iconSize: [22,22], iconAnchor: [11,11] });
    userMarker = L.marker(App.position, { icon }).addTo(activeMap);
  } else userMarker.setLatLng(App.position);
  if (App.positionAccuracy) {
    const accent = getComputedStyle(document.body).getPropertyValue('--accent').trim() || '#e8442a';
    if (!userAccCircle) {
      userAccCircle = L.circle(App.position, { radius: App.positionAccuracy, color: accent, fillOpacity: 0.1, weight: 1 }).addTo(activeMap);
    } else {
      userAccCircle.setLatLng(App.position);
      userAccCircle.setRadius(App.positionAccuracy);
    }
  }
}

function startGeolocation() {
  if (App.watchId !== null) return;
  if (!navigator.geolocation) return snackbar('Geolocation stöds inte i denna webbläsare');
  App.watchId = navigator.geolocation.watchPosition(
    pos => {
      App.position = [pos.coords.latitude, pos.coords.longitude];
      App.positionAccuracy = pos.coords.accuracy;
      checkTrigger();
      if (App.view === 'active') {
        updateUserMarker();
        updateLiveDistance();
      }
    },
    err => {
      if (err.code === 1) snackbar('Geolocation nekat — använd manuella triggers');
      else if (err.code === 2) snackbar('GPS hittar dig inte');
    },
    { enableHighAccuracy: true, maximumAge: 5000, timeout: 15000 }
  );
}

function stopGeolocation() {
  if (App.watchId !== null) { navigator.geolocation.clearWatch(App.watchId); App.watchId = null; }
}

function checkTrigger() {
  if (!App.active || !App.position) return;
  const wps = App.tour.waypoints;
  const mult = Settings.get('radius_multiplier', 1.0);
  for (let i = 0; i < wps.length; i++) {
    const w = wps[i];
    if (App.progress.visited.includes(w.id) || App.progress.skipped?.includes(w.id)) continue;
    const r = (w.trigger_radius_m || 30) * mult;
    if (haversine(App.position, w.coordinates) <= r) {
      App.activeWaypointIdx = i;
      triggerArrival();
      return;
    }
  }
}

function triggerArrival() {
  const wp = App.tour.waypoints[App.activeWaypointIdx];
  if (!wp) return;
  if (App.progress.visited.includes(wp.id)) return;
  if (App.arrivedAtWpId === wp.id) return;
  App.arrivedAtWpId = wp.id;
  if (Settings.get('vibrate', true) && navigator.vibrate) navigator.vibrate([100, 50, 100]);
  showWaypointModal(App.activeWaypointIdx, true);
}

function skipWaypoint() {
  const wp = App.tour.waypoints[App.activeWaypointIdx];
  if (!App.progress.skipped) App.progress.skipped = [];
  if (!App.progress.skipped.includes(wp.id)) App.progress.skipped.push(wp.id);
  saveProgress(App.tour.tour.id, App.progress);
  advance();
}

function markVisited(idx) {
  const wp = App.tour.waypoints[idx];
  if (!App.progress.visited.includes(wp.id)) App.progress.visited.push(wp.id);
  saveProgress(App.tour.tour.id, App.progress);
}

function advance() {
  closeModal();
  App.arrivedAtWpId = null;
  const wps = App.tour.waypoints;
  if (App.activeWaypointIdx + 1 < wps.length) {
    App.activeWaypointIdx++;
    render();
  } else {
    endTour();
  }
}

function endTour() {
  stopTTS();
  App.active = false;
  App.view = 'summary';
  stopGeolocation();
  releaseWakeLock();
  render();
}

/* --- Modal --- */
let modalEl = null;
function openModal(content) {
  closeModal();
  const backdrop = el('div', { class: 'modal-backdrop', onclick: e => { if (e.target === backdrop) closeModal(); } },
    el('div', { class: 'modal' }, content)
  );
  document.body.appendChild(backdrop);
  modalEl = backdrop;
  return backdrop;
}
function closeModal() { if (modalEl) { modalEl.remove(); modalEl = null; } stopTTS(); }

async function showWaypointModal(idx, isArrival) {
  const wp = App.tour.waypoints[idx];
  const t = App.tour.tour;
  const visited = App.progress.visited.includes(wp.id);
  const total = App.tour.waypoints.length;

  const imagesDiv = el('div', { class: 'wp-images' });
  const linksDiv = el('div', { class: 'links' });

  const ttsBtn = el('button', { class: 'tts-btn', id: 'tts-btn', onclick: () => onTTSClick(wp.narrative, t.language) },
    el('span', { class: 'icon' }, '▶'),
    el('span', {}, 'Läs upp högt')
  );

  const content = el('div', {},
    el('div', { class: 'modal-header' },
      el('div', { style: 'flex:1; min-width: 0;' },
        el('div', { class: 'modal-kicker' }, `Stopp ${String(wp.order).padStart(2,'0')} av ${String(total).padStart(2,'0')}${wp.walk_to_next ? ' · ' + fmtDist(wp.walk_to_next.distance_m) + ' till nästa' : ''}`),
        el('div', { class: 'modal-title' }, wp.title),
        el('div', { class: 'modal-sub' }, wp.short)
      ),
      el('button', { class: 'close', onclick: () => closeModal() }, '✕')
    ),
    imagesDiv,
    ttsBtn,
    el('div', { class: 'narrative' }, wp.narrative),
    wp.trivia && wp.trivia.length ? el('div', { class: 'trivia' },
      el('ul', {}, wp.trivia.map(t => el('li', {}, t)))
    ) : null,
    wp.accessibility_notes ? el('div', { class: 'banner warn' }, '♿ ' + wp.accessibility_notes) : null,
    idx < total - 1 ? (() => {
      const next = App.tour.waypoints[idx + 1];
      return el('div', { class: 'next-stop' },
        el('div', { class: 'lbl' }, '↗ Nästa stopp'),
        el('div', { class: 'title' }, next.title),
        wp.walk_to_next ? el('div', { class: 'walk-meta' }, `${fmtDist(wp.walk_to_next.distance_m)} · ~${wp.walk_to_next.estimated_minutes} min promenad`) : null,
        el('button', { class: 'btn', onclick: () => {
          if (App.active) { markVisited(idx); advance(); }
          openInMaps(next.coordinates);
        }}, `Navigera till ${next.title}`)
      );
    })() : null,
    linksDiv,
    el('div', { class: 'btn-row' },
      el('button', { class: 'btn secondary', onclick: () => openInMaps(wp.coordinates) }, `↗ Hitta hit`)
    ),
    App.active ? el('div', { class: 'btn-row' },
      el('button', { class: 'btn accent', onclick: () => { markVisited(idx); advance(); } }, visited ? 'Nästa stopp →' : 'Klar — gå vidare →')
    ) : null
  );

  openModal(content);
  loadWaypointImages(wp, t, imagesDiv);
  renderLinks(wp.links || [], linksDiv);
  setTTSButton('idle');
}

async function loadWaypointImages(wp, tour, container) {
  const imgs = wp.images || [];
  for (const img of imgs) {
    if (img.source === 'wikipedia') {
      const lang = img.lang || tour.language || 'en';
      try {
        const data = await fetchWikiSummary(lang, img.article);
        if (data && data.thumbnail && data.thumbnail.source) {
          const im = el('img', { src: data.originalimage?.source || data.thumbnail.source, alt: wp.title, loading: 'lazy' });
          im.onerror = () => im.remove();
          container.appendChild(im);
        }
      } catch { /* skip */ }
    } else if (img.source === 'search_query') {
      const a = el('a', { class: 'img-search', href: `https://www.google.com/search?tbm=isch&q=${encodeURIComponent(img.query)}`, target: '_blank', rel: 'noopener noreferrer' }, '⌕ Visa bilder');
      container.appendChild(a);
    }
  }
}

async function fetchWikiSummary(lang, slug) {
  const key = `wiki::${lang}::${slug}`;
  try {
    const cached = JSON.parse(localStorage.getItem(key));
    if (cached && Date.now() - cached.fetched_at < 30*24*60*60*1000) return cached.data;
  } catch {}
  const res = await fetch(`https://${lang}.wikipedia.org/api/rest_v1/page/summary/${encodeURIComponent(slug)}`);
  if (!res.ok) return null;
  const data = await res.json();
  try { localStorage.setItem(key, JSON.stringify({ data, fetched_at: Date.now() })); } catch {}
  return data;
}

function renderLinks(links, container) {

/* --- TTS --- */
function setTTSButton(state) {
  const btn = document.getElementById('tts-btn');
  if (!btn) return;
  const icon = btn.querySelector('.icon');
  const label = btn.querySelectorAll('span')[1];
  const labels = { idle: 'Läs upp högt', loading: 'Hämtar röst…', playing: 'Pausa', paused: 'Spela' };
  const icons  = { idle: '▶', loading: '◌', playing: '❚❚', paused: '▶' };
  if (label) label.textContent = labels[state] || labels.idle;
  if (icon) icon.textContent = icons[state] || icons.idle;
  btn.disabled = state === 'loading';
  btn.dataset.state = state;
}

function ensureAudioElement() {
  if (App.ttsAudioEl) return App.ttsAudioEl;
  const a = new Audio();
  a.preload = 'auto';
  a.addEventListener('ended', () => setTTSButton('idle'));
  a.addEventListener('play', () => setTTSButton('playing'));
  a.addEventListener('pause', () => { if (!a.ended && a.currentTime > 0) setTTSButton('paused'); });
  App.ttsAudioEl = a;
  return a;
}
function primeAudioGesture() {
  const a = ensureAudioElement();
  try { a.load(); } catch {}
}
function stopTTS() {
  if (App.ttsAbort) { try { App.ttsAbort.abort(); } catch {} App.ttsAbort = null; }
  if (App.ttsAudioEl) {
    try { App.ttsAudioEl.pause(); } catch {}
    if (App.ttsAudioEl.src && App.ttsAudioEl.src.startsWith('blob:')) URL.revokeObjectURL(App.ttsAudioEl.src);
    App.ttsAudioEl.removeAttribute('src');
  }
  if (window.speechSynthesis) window.speechSynthesis.cancel();
  App.ttsPlaying = false;
  setTTSButton('idle');
}
function onTTSClick(text, lang) {
  const btn = document.getElementById('tts-btn');
  const state = btn?.dataset.state || 'idle';
  if (state === 'loading') return;
  if (state === 'playing') {
    if (App.ttsAudioEl && !App.ttsAudioEl.paused) { App.ttsAudioEl.pause(); setTTSButton('paused'); }
    else if (window.speechSynthesis?.speaking) { speechSynthesis.pause(); setTTSButton('paused'); }
    return;
  }
  if (state === 'paused') {
    if (App.ttsAudioEl && App.ttsAudioEl.src) { App.ttsAudioEl.play().catch(()=>{}); setTTSButton('playing'); }
    else if (window.speechSynthesis?.paused) { speechSynthesis.resume(); setTTSButton('playing'); }
    return;
  }
  primeAudioGesture();
  playTTS(text, lang);
}
async function playTTS(text, lang) {
  stopTTS();
  const provider = Settings.get('tts_provider', 'web');
  if (provider === 'web') return webSpeech(text, lang);
  const key = localStorage.getItem(`byok::${provider}`);
  if (!key) { snackbar(`Ingen ${provider}-nyckel — använder Web Speech`); return webSpeech(text, lang); }
  setTTSButton('loading');
  const ac = new AbortController();
  App.ttsAbort = ac;
  const timeoutId = setTimeout(() => ac.abort('timeout'), 45000);
  try {
    let res;
    if (provider === 'openai') {
      const voice = Settings.get('openai_voice', 'alloy');
      const model = Settings.get('openai_model', 'tts-1-hd');
      const speed = clamp(Number(Settings.get('openai_speed', 1.0)) || 1.0, 0.25, 4.0);
      const body = { model, voice, input: text, speed };
      if (model === 'gpt-4o-mini-tts') {
        body.instructions = Settings.get('openai_instructions', 'Speak in a warm, calm, conversational tour-guide voice.');
      }
      res = await fetch('https://api.openai.com/v1/audio/speech', {
        method: 'POST', signal: ac.signal,
        headers: { 'Authorization': `Bearer ${key}`, 'Content-Type': 'application/json' },
        body: JSON.stringify(body)
      });
    } else if (provider === 'elevenlabs') {
      const voiceId = Settings.get('elevenlabs_voice', '21m00Tcm4TlvDq8ikWAM');
      res = await fetch(`https://api.elevenlabs.io/v1/text-to-speech/${voiceId}`, {
        method: 'POST', signal: ac.signal,
        headers: { 'xi-api-key': key, 'Content-Type': 'application/json' },
        body: JSON.stringify({ text, model_id: 'eleven_multilingual_v2' })
      });
    }
    clearTimeout(timeoutId);
    if (ac.signal.aborted) return;
    if (!res.ok) { snackbar(`${provider} TTS misslyckades (HTTP ${res.status})`); setTTSButton('idle'); return; }
    const blob = await res.blob();
    if (ac.signal.aborted) return;
    if (!blob || blob.size < 200) { snackbar(`${provider} returnerade tom audio`); setTTSButton('idle'); return; }
    const audio = ensureAudioElement();
    if (audio.src && audio.src.startsWith('blob:')) URL.revokeObjectURL(audio.src);
    audio.src = URL.createObjectURL(blob);
    App.ttsPlaying = true;
    try { await audio.play(); }
    catch (playErr) { snackbar(`Uppspelning blockerad — tryck igen.`); setTTSButton('idle'); }
  } catch (e) {
    if (ac.signal.reason === 'timeout') { snackbar(`${provider} TTS svarade inte`); setTTSButton('idle'); return; }
    if (e.name === 'AbortError') return;
    snackbar(`${provider} TTS-fel: ${e.message || e}`); setTTSButton('idle');
  } finally {
    clearTimeout(timeoutId);
    if (App.ttsAbort === ac) App.ttsAbort = null;
  }
}
function webSpeech(text, lang) {
  if (!window.speechSynthesis) { snackbar('Uppläsning stöds inte'); setTTSButton('idle'); return; }
  const u = new SpeechSynthesisUtterance(text);
  if (lang) u.lang = lang.length === 2 ? lang + '-' + lang.toUpperCase() : lang;
  u.onstart = () => setTTSButton('playing');
  u.onend = () => setTTSButton('idle');
  u.onerror = () => setTTSButton('idle');
  speechSynthesis.speak(u);
  App.ttsPlaying = true;
}

/* --- Maps deep-link --- */
function openInMaps(coords) {
  const [lat, lng] = coords;
  const pref = Settings.get('maps_app', 'google');
  const isApple = /iPhone|iPad|iPod|Macintosh/.test(navigator.userAgent);
  if (pref === 'apple') { window.location.href = `maps://maps.apple.com/?daddr=${lat},${lng}&dirflg=w`; return; }
  if (pref === 'osm') { window.open(`https://www.openstreetmap.org/directions?from=&to=${lat}%2C${lng}&route=foot`, '_blank'); return; }
  if (isApple) {
    const fallback = `https://www.google.com/maps/dir/?api=1&destination=${lat},${lng}&travelmode=walking`;
    const start = Date.now();
    window.location.href = `comgooglemaps://?daddr=${lat},${lng}&directionsmode=walking`;
    setTimeout(() => {
      if (document.visibilityState === 'visible' && Date.now() - start < 1500) window.location.href = fallback;
    }, 800);
    return;
  }
  window.open(`https://www.google.com/maps/dir/?api=1&destination=${lat},${lng}&travelmode=walking`, '_blank');
}

/* --- Wake Lock --- */
async function acquireWakeLock() {
  if (!Settings.get('wake_lock', true)) return;
  if (!('wakeLock' in navigator)) return;
  try { App.wakeLock = await navigator.wakeLock.request('screen'); } catch {}
}
function releaseWakeLock() { if (App.wakeLock) { App.wakeLock.release(); App.wakeLock = null; } }
document.addEventListener('visibilitychange', () => {
  if (document.visibilityState === 'visible' && App.active) acquireWakeLock();
});

/* --- Navigation --- */
function openTour(id) {
  const tour = loadTour(id);
  if (!tour) return snackbar('Turen kunde inte laddas');
  App.tour = tour;
  App.tourId = id;
  App.progress = loadProgress(id);
  App.startedAt = null;
  App.view = 'overview';
  render();
}

function goHome() {
  stopGeolocation(); releaseWakeLock(); stopTTS();
  App.active = false;
  App.tour = null;
  App.tourId = null;
  App.view = 'start';
  render();
}

$('#btn-home').addEventListener('click', goHome);
$('#btn-settings').addEventListener('click', () => { App.view = 'settings'; render(); });

window.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

/* ============ Tweaks panel ============ */
const Tweaks = {
  state: {
    palette: localStorage.getItem('tweaks::palette') || 'default',
    stamps: localStorage.getItem('tweaks::stamps') !== 'off',
    weight: localStorage.getItem('tweaks::weight') || '800',
  },
  apply() {
    document.body.dataset.palette = this.state.palette === 'default' ? '' : this.state.palette;
    document.body.classList.toggle('no-stamps', !this.state.stamps);
    document.documentElement.style.setProperty('--display-weight', this.state.weight);
    // Tweak heading weights live
    document.querySelectorAll('h1, h2, .wp-num, .btn').forEach(e => e.style.fontWeight = this.state.weight);
    this.updateUI();
  },
  updateUI() {
    document.querySelectorAll('[data-pal]').forEach(b => b.classList.toggle('active', b.dataset.pal === this.state.palette));
    document.querySelectorAll('[data-stamp]').forEach(b => b.classList.toggle('active', (b.dataset.stamp === 'on') === this.state.stamps));
    document.querySelectorAll('[data-weight]').forEach(b => b.classList.toggle('active', b.dataset.weight === this.state.weight));
  },
  setPalette(p) { this.state.palette = p; localStorage.setItem('tweaks::palette', p); this.apply(); },
  setStamps(on) { this.state.stamps = on; localStorage.setItem('tweaks::stamps', on ? 'on' : 'off'); this.apply(); },
  setWeight(w) { this.state.weight = w; localStorage.setItem('tweaks::weight', w); this.apply(); },
};

const tweaksPanel = $('#tweaks');
$('#btn-tweaks').addEventListener('click', () => {
  tweaksPanel.classList.toggle('hidden');
  tweaksPanel.setAttribute('aria-hidden', tweaksPanel.classList.contains('hidden'));
});
$('#tweaks-close').addEventListener('click', () => {
  tweaksPanel.classList.add('hidden');
  tweaksPanel.setAttribute('aria-hidden', 'true');
});
$$('[data-pal]').forEach(b => b.addEventListener('click', () => Tweaks.setPalette(b.dataset.pal)));
$$('[data-stamp]').forEach(b => b.addEventListener('click', () => Tweaks.setStamps(b.dataset.stamp === 'on')));
$$('[data-weight]').forEach(b => b.addEventListener('click', () => Tweaks.setWeight(b.dataset.weight)));

Tweaks.apply();
